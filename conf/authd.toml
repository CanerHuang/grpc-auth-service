[server]
# gRPC 監聽位址，格式為 host:port。host 留空表示綁定所有介面。
listen_address = ':30052'
# Unix domain socket 路徑（絕對路徑）；留空表示不啟用 UDS，可與 listen_address 並存。
# listen_address 與 unix_socket_path 至少需設定一個。
# unix_socket_path = '/tmp/authd/authd.sock'

# gRPC server keepalive 時間設定。
[server.keepalive]
# 連線閒置多久後主動送 keepalive ping 探活。
time = '10s'
# 送出 ping 後等待回應的逾時，逾時未收到回應即斷線。
timeout = '3s'
# 允許 client 端 keepalive ping 的最短間隔，過於頻繁會被視為違規而中斷連線。
min_time = '5s'

[storage]
# SQLite 資料庫檔案路徑；若父目錄不存在，SQLite Driver 會嘗試自動建立。
sqlite_path = 'data/authd.db'
# SQLite busy_timeout；資料庫遭鎖定時的最長等待時間。
busy_timeout = '5s'

[auth]
# JWT 簽發者（Issuer），其值會寫入 Access Token 的 `iss` claim。
issuer = 'auth-service'
# Access Token 的有效期限（至少為 1 秒）。
access_token_ttl = '5m'
# Refresh Token 的有效期限（至少為 1 秒，且不得短於 access_token_ttl）。
refresh_token_ttl = '30m'
# 系統允許的最大使用者數，CreateUser 超過會回 ResourceExhausted。
max_users = 20
# HS256 簽章金鑰；正式環境請使用高熵隨機產生的金鑰，切勿沿用範例值。
signing_key = 'my_secret_signing_key'
# 首次啟動且 users 表為空時，會自動建立的管理員帳號。
bootstrap_admin_username = 'admin'
bootstrap_admin_password = 'Admin123!'
bootstrap_admin_display_name = 'Admin'
bootstrap_admin_roles = ['admin']

# ---- [default_setting] — first-run seed for authd-settings.toml ----
# 當 daemon 首次啟動且找不到 authd-settings.toml 時，
# 會以本區塊的內容產生設定檔並載入使用。
[default_setting]
# Refresh Token 續期時是否延長過期時間
refresh_token_extend_on_refresh = true
